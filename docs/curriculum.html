<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  
  <title>📜 Currículo - João Gabriel</title>
  <meta name="description" content="Currículo profissional de João Gabriel - Desenvolvedor Web e Artista Digital.">
  <meta name="keywords" content="currículo, cv, desenvolvedor, web, artista, programação">
  <meta name="author" content="João Gabriel Sousa Santos">
  
  <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/curriculum_style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    .curriculum-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .curriculum-header {
      text-align: center;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 2px solid rgba(139, 92, 246, 0.3);
    }

    .curriculum-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .download-btn {
      padding: 0.75rem 1.5rem;
      border: 2px solid var(--color-primary);
      background: var(--color-primary);
      color: var(--color-bg);
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(139, 92, 246, 0.4);
    }

    .download-btn.outline {
      background: transparent;
      color: var(--color-text);
      border-color: var(--color-primary);
    }

    .download-btn.outline:hover {
      background: var(--color-primary);
      color: var(--color-bg);
    }

    .download-btn.edit-btn {
      background: #22c55e;
      border-color: #22c55e;
      color: white;
    }

    .download-btn.edit-btn:hover {
      background: #16a34a;
      border-color: #16a34a;
      box-shadow: 0 8px 16px rgba(34, 197, 94, 0.4);
    }

    .download-btn.repo-btn {
      background: #6b7280;
      border-color: #6b7280;
      color: white;
    }

    .download-btn.repo-btn:hover {
      background: #4b5563;
      border-color: #4b5563;
      box-shadow: 0 8px 16px rgba(107, 114, 128, 0.4);
    }

    .curriculum-content {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(139, 92, 246, 0.05) 100%);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 1rem;
      padding: 2.5rem;
      backdrop-filter: blur(10px);
    }

    .curriculum-name {
      font-size: 2.2rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      color: var(--color-text);
    }

    .curriculum-contact {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      color: var(--color-secondary-text);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .curriculum-contact-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .curriculum-contact-item i {
      color: var(--color-primary);
      width: 1rem;
    }

    .curriculum-contact-item a {
      color: var(--color-primary);
      text-decoration: none;
    }

    .curriculum-contact-item a:hover {
      text-decoration: underline;
    }

    .curriculum-section {
      margin-bottom: 2.5rem;
      padding-bottom: 2.5rem;
      border-bottom: 1px solid rgba(139, 92, 246, 0.2);
    }

    .curriculum-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0 0 1.5rem 0;
      color: var(--color-primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .objective-text {
      color: var(--color-secondary-text);
      line-height: 1.6;
      font-style: italic;
    }

    .resume-text {
      color: var(--color-secondary-text);
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .education-item,
    .experience-item,
    .course-item {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px dotted rgba(139, 92, 246, 0.2);
    }

    .education-item:last-child,
    .experience-item:last-child,
    .course-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 1rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .item-title {
      font-weight: 700;
      color: var(--color-text);
      font-size: 1.05rem;
    }

    .item-subtitle {
      color: var(--color-primary);
      font-weight: 600;
    }

    .item-period {
      color: var(--color-secondary-text);
      font-size: 0.9rem;
      font-style: italic;
    }

    .item-description {
      color: var(--color-secondary-text);
      line-height: 1.6;
      margin-top: 0.75rem;
    }

    .item-description ul {
      margin: 0.75rem 0 0 1.5rem;
      padding: 0;
    }

    .item-description li {
      margin-bottom: 0.5rem;
      color: var(--color-secondary-text);
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .skill-category {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 0.5rem;
      padding: 1rem;
    }

    .skill-category h4 {
      margin: 0 0 0.75rem 0;
      color: var(--color-primary);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .skill-tag {
      background: rgba(139, 92, 246, 0.2);
      border: 1px solid rgba(139, 92, 246, 0.3);
      padding: 0.35rem 0.75rem;
      border-radius: 1rem;
      font-size: 0.85rem;
      color: var(--color-text);
    }

    #curriculum-print {
      display: none;
    }

    /* Modal de Login */
    .login-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .login-modal {
      background: var(--color-bg);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 1rem;
      padding: 2.5rem;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-modal h2 {
      text-align: center;
      margin-bottom: 0.5rem;
      color: var(--color-text);
    }

    .login-modal p {
      text-align: center;
      color: var(--color-secondary-text);
      margin-bottom: 1.5rem;
    }

    .login-modal .form-group {
      margin-bottom: 1rem;
    }

    .login-modal .form-group label {
      display: block;
      margin-bottom: 0.3rem;
      color: var(--color-text);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .login-modal .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 0.5rem;
      background: var(--color-bg-secondary);
      color: var(--color-text);
      font-size: 1rem;
    }

    .login-modal .form-group input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

    .login-modal .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .login-modal .btn-login {
      flex: 1;
      padding: 0.75rem;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-modal .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(139, 92, 246, 0.4);
    }

    .login-modal .btn-cancel {
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 0.5rem;
      color: var(--color-text);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-modal .btn-cancel:hover {
      background: rgba(139, 92, 246, 0.1);
    }

    .login-error {
      color: #ef4444;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .login-success {
      color: #22c55e;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    /* Edit Modal */
    .edit-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      overflow-y: auto;
      padding: 2rem 0;
    }

    .edit-modal {
      background: var(--color-bg);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 1rem;
      padding: 2.5rem;
      max-width: 700px;
      width: 95%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .edit-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(139, 92, 246, 0.2);
    }

    .edit-modal-header h2 {
      margin: 0;
      color: var(--color-text);
    }

    .edit-modal-header .close-btn {
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      color: var(--color-secondary-text);
      transition: color 0.3s ease;
    }

    .edit-modal-header .close-btn:hover {
      color: var(--color-text);
    }

    .edit-section {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(139, 92, 246, 0.1);
    }

    .edit-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .edit-section h3 {
      margin: 0 0 1rem 0;
      color: var(--color-primary);
      font-size: 1.1rem;
    }

    .edit-field {
      margin-bottom: 1rem;
    }

    .edit-field label {
      display: block;
      margin-bottom: 0.3rem;
      color: var(--color-text);
      font-weight: 600;
      font-size: 0.85rem;
    }

    .edit-field input,
    .edit-field textarea,
    .edit-field select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 0.5rem;
      background: var(--color-bg-secondary);
      color: var(--color-text);
      font-size: 0.95rem;
      font-family: inherit;
    }

    .edit-field textarea {
      resize: vertical;
      min-height: 80px;
    }

    .edit-field input:focus,
    .edit-field textarea:focus,
    .edit-field select:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

    .edit-item {
      background: rgba(139, 92, 246, 0.05);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .edit-item h4 {
      margin: 0 0 1rem 0;
      color: var(--color-text);
      font-size: 1rem;
    }

    .edit-item .btn-remove-item {
      padding: 0.4rem 1rem;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 0.3rem;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
    }

    .edit-item .btn-remove-item:hover {
      background: #dc2626;
    }

    .btn-add-item {
      padding: 0.5rem 1rem;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .btn-add-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(139, 92, 246, 0.2);
    }

    .btn-save {
      flex: 1;
      padding: 0.75rem;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(34, 197, 94, 0.4);
    }

    .btn-cancel-edit {
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 0.5rem;
      color: var(--color-text);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-cancel-edit:hover {
      background: rgba(139, 92, 246, 0.1);
    }

    .edit-status {
      padding: 0.75rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      display: none;
    }

    .edit-status.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid #22c55e;
      color: #22c55e;
    }

    .edit-status.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #ef4444;
    }

    @media print {
      body {
        background: white;
        color: black;
      }

      #navbar,
      .curriculum-actions,
      #footer {
        display: none !important;
      }

      .curriculum-content {
        background: white !important;
        border: none !important;
        padding: 0 !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
      }

      .curriculum-section {
        page-break-inside: avoid;
      }

      a {
        color: black;
        text-decoration: underline;
      }
    }

    @media (max-width: 768px) {
      .curriculum-content {
        padding: 1.5rem;
      }

      .curriculum-name {
        font-size: 1.8rem;
      }

      .curriculum-contact {
        flex-direction: column;
        gap: 0.75rem;
      }

      .item-header {
        flex-direction: column;
      }

      .skills-grid {
        grid-template-columns: 1fr;
      }

      .curriculum-actions {
        gap: 0.5rem;
      }

      .download-btn {
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
      }

      .edit-modal {
        padding: 1.5rem;
        margin: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav id="navbar" role="navigation" aria-label="Menu principal">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="./">🌙 YukiriDensuki</a>
      </div>
      <ul class="nav-links">
        <li><a href="./">🏠 Início</a></li>
        <li><a href="./#about">📖 Sobre</a></li>
        <li><a href="./#projects">📁 Projetos</a></li>
        <li><a href="./#certificates">🏆 Certificados</a></li>
        <li><a href="./courses.html">📚 Cursos</a></li>
        <li><a href="./curriculum.html" class="active">📜 Currículo</a></li>
        <li><a href="./#contact">💬 Contato</a></li>
      </ul>
      <div class="nav-controls">
        <button id="theme-toggle" aria-label="Alternar tema">
          <i class="fas fa-moon"></i>
        </button>
        <button id="music-toggle" aria-label="Alternar música">
          <i class="fas fa-music"></i>
        </button>
        <button id="music-panel-toggle" aria-label="Abrir painel de música">
          <i class="fas fa-sliders-h"></i>
        </button>
        <div class="music-controls" id="music-controls" aria-hidden="true">
          <button id="vol-down" aria-label="Diminuir volume"><i class="fas fa-volume-down"></i></button>
          <input id="volume-range" type="range" min="0" max="1" step="0.01" value="0.5" aria-label="Volume">
          <button id="vol-up" aria-label="Aumentar volume"><i class="fas fa-volume-up"></i></button>
          <select id="music-select" aria-label="Escolher música"></select>
        </div>
        <div class="hamburger" id="hamburger" aria-label="Menu mobile">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main style="padding-top: 2rem;">
    <section class="section curriculum-container" style="margin-top: 2rem;">
      <div class="curriculum-header">
        <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">
          <i class="fas fa-file-pdf"></i> Meu Currículo
        </h1>
        <p style="color: var(--color-secondary-text); margin-top: 1rem;">
          Confira minhas informações profissionais e baixe em seu formato preferido.
        </p>
      </div>

      <div class="curriculum-actions">
        <button class="download-btn" id="download-pdf">
          <i class="fas fa-file-pdf"></i> Baixar PDF
        </button>
        <button class="download-btn outline" id="download-docx">
          <i class="fas fa-file-word"></i> Baixar DOCX
        </button>
        <button class="download-btn outline" id="print-btn">
          <i class="fas fa-print"></i> Imprimir
        </button>
        <button class="download-btn edit-btn" id="edit-btn">
          <i class="fas fa-edit"></i> Editar Currículo
        </button>
      </div>
      
      <div class="curriculum-actions" style="margin-top: -0.5rem;">
        <button class="download-btn repo-btn" id="download-repo-pdf">
          <i class="fas fa-file-pdf"></i> PDF do Repositório
        </button>
        <button class="download-btn repo-btn" id="download-repo-docx">
          <i class="fas fa-file-word"></i> DOCX do Repositório
        </button>
      </div>

      <!-- CONTEÚDO DO CURRÍCULO (renderizado via JS) -->
      <div class="curriculum-content" id="curriculum-content">
        <div style="text-align: center; padding: 2rem;">
          <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--color-primary);"></i>
          <p style="color: var(--color-secondary-text); margin-top: 1rem;">Carregando currículo...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer id="footer">
    <div class="container">
      <div id="footer-content">
        <!-- Preenchido via JS -->
      </div>
    </div>
  </footer>

  <!-- AUDIO -->
  <audio id="bg-music" loop>
    <source src="assets/audio/background.mp3" type="audio/mpeg">
  </audio>

  <div id="music-player-ui" class="music-player-ui">
    <div class="player-info">
      <span id="current-track">🎵 Música</span>
    </div>
  </div>

  <!-- EDIÇÃO - MODAL -->
  <div id="edit-modal-overlay" class="edit-modal-overlay">
    <div class="edit-modal">
      <div class="edit-modal-header">
        <h2><i class="fas fa-edit"></i> Editar Currículo</h2>
        <button id="close-edit-modal" class="close-btn">&times;</button>
      </div>
      <div class="edit-modal-body">
        <form id="curriculum-edit-form">
          <div id="edit-fields-container"></div>
          
          <div class="form-actions">
            <button type="submit" class="btn-save"><i class="fas fa-save"></i> Salvar Alterações</button>
            <button type="button" id="cancel-edit" class="btn-cancel-edit">Cancelar</button>
          </div>
          
          <div id="edit-status" class="edit-status"></div>
        </form>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.min.js"></script>
  <script src="js/main.js" type="module"></script>
  <script src="js/curriculum.js"></script>
</body>
</html>
