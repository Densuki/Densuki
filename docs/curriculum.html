  <script>
    // ============================================
    // CONFIGURAÇÃO DA API
    // ============================================
    const API_BASE = window.location.hostname.includes('github.dev')
        ? 'https://' + window.location.hostname.replace('-5000', '') + '-5000.app.github.dev/api'
        : 'http://localhost:5000/api';
    // ============================================
    // ESTADO GLOBAL
    // ============================================
    let currentUser = null;
    let currentToken = null;
    let curriculumData = null;

    // ============================================
    // FUNÇÕES DE AUTENTICAÇÃO
    // ============================================
    async function checkAuth() {
        const token = localStorage.getItem('curriculumToken');
        if (!token) return false;
        
        try {
            const response = await fetch(`${API_BASE}/auth/verify`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
            
            if (response.ok) {
                const data = await response.json();
                currentUser = data.user;
                currentToken = token;
                return true;
            }
        } catch (error) {
            console.error('Erro ao verificar autenticação:', error);
        }
        
        localStorage.removeItem('curriculumToken');
        return false;
    }

    async function login(username, password) {
        try {
            const response = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });
            
            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('curriculumToken', data.token);
                currentUser = data.user;
                currentToken = data.token;
                return { success: true, user: data.user };
            } else {
                const error = await response.json();
                return { success: false, message: error.message };
            }
        } catch (error) {
            console.error('Erro no login:', error);
            return { success: false, message: 'Erro de conexão com o servidor' };
        }
    }

    // ============================================
    // FUNÇÕES DE CURRÍCULO
    // ============================================
    async function loadCurriculum() {
        try {
            const response = await fetch(`${API_BASE}/curriculum`);
            if (response.ok) {
                curriculumData = await response.json();
                renderCurriculum(curriculumData);
                return true;
            }
            return false;
        } catch (error) {
            console.error('Erro ao carregar currículo:', error);
            return false;
        }
    }

    async function saveCurriculum(data) {
        if (!currentToken) {
            showLoginModal();
            return false;
        }
        
        try {
            const response = await fetch(`${API_BASE}/curriculum`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentToken}`
                },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                const result = await response.json();
                showEditStatus('✅ ' + result.message, 'success');
                await loadCurriculum();
                return true;
            } else if (response.status === 401) {
                localStorage.removeItem('curriculumToken');
                showLoginModal();
                return false;
            } else {
                const error = await response.json();
                showEditStatus('❌ ' + (error.message || 'Erro ao salvar'), 'error');
                return false;
            }
        } catch (error) {
            console.error('Erro ao salvar currículo:', error);
            showEditStatus('❌ Erro de conexão com o servidor', 'error');
            return false;
        }
    }

    // ============================================

    // ============================================
    function showLoginModal() {
        // Remove modal existente
        const existing = document.querySelector('.login-modal-overlay');
        if (existing) existing.remove();

        const modal = document.createElement('div');
        modal.className = 'login-modal-overlay';
        modal.innerHTML = `
            <div class="login-modal">
                <h2>🔐 Acesso ao Currículo</h2>
                <p>Faça login para editar o currículo</p>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Usuário</label>
                        <input type="text" id="login-username" placeholder="Usuário" required autocomplete="username">
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">Senha</label>
                        <input type="password" id="login-password" placeholder="Senha" required autocomplete="current-password">
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn-login">Entrar</button>
                        <button type="button" class="btn-cancel" onclick="this.closest('.login-modal-overlay').remove()">Cancelar</button>
                    </div>
                    
                    <div id="login-error" class="login-error"></div>
                    <div id="login-success" class="login-success"></div>
                </form>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            const result = await login(username, password);
            if (result.success) {
                document.getElementById('login-success').textContent = '✅ Login realizado com sucesso!';
                document.getElementById('login-error').textContent = '';
                setTimeout(() => {
                    modal.remove();
                    document.getElementById('edit-btn').style.display = 'inline-flex';
                    loadCurriculum();
                }, 1000);
            } else {
                document.getElementById('login-error').textContent = '❌ ' + (result.message || 'Usuário ou senha incorretos');
                document.getElementById('login-success').textContent = '';
            }
        });
    }

    // ============================================
    function collectFormData() {
        const form = document.getElementById('curriculum-edit-form');
        const inputs = form.querySelectorAll('[data-path]');
        const data = JSON.parse(JSON.stringify(curriculumData));
        
        inputs.forEach(input => {
            const path = input.dataset.path.split('.');
            let current = data;
            
            for (let i = 0; i < path.length - 1; i++) {
                if (!current[path[i]]) current[path[i]] = {};
                current = current[path[i]];
            }
            
            const key = path[path.length - 1];
            
            // Processar diferentes tipos de dados
            if (input.dataset.type === 'array') {
                current[key] = input.value.split(',').map(s => s.trim()).filter(Boolean);
            } else if (input.dataset.type === 'array-lines') {
                current[key] = input.value.split('\n').map(s => s.trim()).filter(Boolean);
            } else if (input.type === 'number') {
                current[key] = parseFloat(input.value);
            } else {
                current[key] = input.value;
            }
        });
        
        return data;
    }

                        <option value="Nativo">Nativo</option>
                    </select>
                </div>
                <button type="button" class="btn-remove-item" onclick="removeLanguageItem(${index})">Remover</button>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
        updateItemIndices('languages');
    }

    function removeLanguageItem(index) {
        const container = document.getElementById('languages-fields');
        const items = container.querySelectorAll('.edit-item');
        if (items.length > 1) {
            items[index].remove();
            updateItemIndices('languages');
        }
    }

    function updateItemIndices(section) {
        const container = document.getElementById(`${section}-fields`);
        if (!container) return;
        
        const items = container.querySelectorAll('.edit-item');
        items.forEach((item, newIndex) => {
            item.dataset.index = newIndex;
            item.querySelector('h4').textContent = 
                section === 'education' ? `Formação ${newIndex + 1}` :
                section === 'courses' ? `Curso ${newIndex + 1}` :
                section === 'experience' ? `Experiência ${newIndex + 1}` :
                `Idioma ${newIndex + 1}`;
            
            // Atualizar data-path de todos os inputs
            item.querySelectorAll('[data-path]').forEach(input => {
                const path = input.dataset.path.split('.');
                path[1] = newIndex;
                input.dataset.path = path.join('.');
            });
            
            // Atualizar onclick dos botões remover
            const removeBtn = item.querySelector('.btn-remove-item');
            if (removeBtn) {
                const fn = section === 'education' ? 'removeEducationItem' :
                          section === 'courses' ? 'removeCourseItem' :
                          section === 'experience' ? 'removeExperienceItem' :
                          'removeLanguageItem';
                removeBtn.setAttribute('onclick', `${fn}(${newIndex})`);
            }
        });
    }

    // ============================================
    // DOWNLOAD FUNCTIONS
    // ============================================

    document.getElementById('download-pdf')?.addEventListener('click', () => {
        const element = document.getElementById('curriculum-content');

            filename: 'Curriculo_JoaoGabriel.pdf',

            html2canvas: { scale: 2 },
            jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
        };
        html2pdf().set(opt).from(element).save();
    });

                        size: 28,
                        alignment: AlignmentType.CENTER,
                        spacing: { after: 100 }
                    }),
                    new Paragraph({
                        text: 'Fortaleza - CE • (85) 9 9217-1191 • joaogabriel4175@gmail.com',
                        size: 20,
                        alignment: AlignmentType.CENTER,
                        spacing: { after: 200 }
                    }),
                    new Paragraph({
                        text: 'OBJETIVO PROFISSIONAL',
                        bold: true,
                        size: 24,
                        spacing: { after: 100 }
                    }),
                    new Paragraph({
                        text: curriculumData?.objective || 'Atuar nas áreas de atendimento ao cliente, rotinas administrativas e suporte operacional, contribuindo com organização, resolução de problemas e qualidade no atendimento.',
                        size: 20,
                        spacing: { after: 200 }
                    }),
                    new Paragraph({
                        text: 'RESUMO PROFISSIONAL',
                        bold: true,
                        size: 24,
                        spacing: { after: 100 }
                    }),
                    new Paragraph({
                        text: curriculumData?.summary || 'Profissional com experiência em atendimento ao público e suporte em Lan House, além de atuação voluntária em ambiente escolar com apoio administrativo e organizacional.',
                        size: 20,
                        spacing: { after: 200 }
                    }),
                    new Paragraph({
                        text: 'FORMAÇÃO ACADÊMICA',
                        bold: true,
                        size: 24,
                        spacing: { after: 100 }
                    }),
                    ...(curriculumData?.education?.map(edu => 
                        new Paragraph({
                            text: `• ${edu.degree}${edu.institution ? ` – ${edu.institution}` : ''}${edu.period ? ` (${edu.period})` : ''}`,
                            size: 20
                        })
                    ) || []),
                    new Paragraph({ text: '', spacing: { after: 200 } }),
                    new Paragraph({
                        text: 'CURSOS E CERTIFICAÇÕES',
                        bold: true,
                        size: 24,
                        spacing: { after: 100 }
                    }),
                    ...(curriculumData?.courses?.map(course =>
                        new Paragraph({
                            text: `• ${course.title}${course.duration ? ` (${course.duration})` : ''}${course.institution ? ` – ${course.institution}` : ''}`,
                            size: 20
                        })
                    ) || []),
                    new Paragraph({ text: '', spacing: { after: 200 } }),
                    new Paragraph({
                        text: 'COMPETÊNCIAS',
                        bold: true,
                        size: 24,
                        spacing: { after: 100 }
                    }),
                    new Paragraph({
                        text: (curriculumData?.skills?.core || []).concat(curriculumData?.skills?.technical || []).join(' • ') || 'Atendimento ao Cliente • Comunicação • Organização • Trabalho em Equipe',
                        size: 20,
                        spacing: { after: 200 }
                    }),
                    new Paragraph({
                        text: 'EXPERIÊNCIAS PROFISSIONAIS',
                        bold: true,
                        size: 24,
                        spacing: { after: 100 }
                    })
                ]
            }]
        });

        // Adicionar experiências
        const children = doc.sections[0].children;
        curriculumData?.experience?.forEach(exp => {
            children.push(
                new Paragraph({ text: `Empresa: ${exp.company}`, bold: true, size: 20 }),
                new Paragraph({ text: `Cargo: ${exp.position}`, size: 20 }),
                new Paragraph({ text: `Período: ${exp.startDate} - ${exp.endDate}`, size: 20, spacing: { after: 100 } })
            );
            exp.responsibilities?.forEach(resp => {
                children.push(new Paragraph({ text: `• ${resp}`, size: 20 }));
            });
            children.push(new Paragraph({ text: '', spacing: { after: 200 } }));
        });

        Packer.toBlob(doc).then(blob => {
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Curriculo_JoaoGabriel.docx';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
        });
    });

    // Imprimir
    document.getElementById('print-btn')?.addEventListener('click', () => {
        window.print();
    });

    // Download do PDF do repositório
    document.getElementById('download-repo-pdf')?.addEventListener('click', () => {
        window.open('assets/curriculo_pessoal.pdf', '_blank');
    });

    // Download do DOCX do repositório
    document.getElementById('download-repo-docx')?.addEventListener('click', () => {
        window.open('assets/curriculo_pessoal.docx', '_blank');
    });

    // ============================================
    // INICIALIZAÇÃO
    // ============================================
    document.addEventListener('DOMContentLoaded', async function() {
        // Carregar currículo
        await loadCurriculum();
        
        // Verificar autenticação
        const isAuth = await checkAuth();
        if (isAuth) {
            document.getElementById('edit-btn').style.display = 'inline-flex';
        }
        
        // Configurar botão de edição
        document.getElementById('edit-btn')?.addEventListener('click', function() {
            if (!currentToken) {
                showLoginModal();
            } else {
                showEditModal();
            }
        });
        
        // Configurar modal de edição
        document.getElementById('close-edit-modal')?.addEventListener('click', () => {
            document.getElementById('edit-modal-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        });
        
        document.getElementById('cancel-edit')?.addEventListener('click', () => {
            document.getElementById('edit-modal-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        });
        
        document.getElementById('curriculum-edit-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = collectFormData();
            if (await saveCurriculum(data)) {
                document.getElementById('edit-modal-overlay').style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });
        
        // Fechar modal ao clicar fora
        document.getElementById('edit-modal-overlay')?.addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('edit-modal-overlay').style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });
    });
  </script>
