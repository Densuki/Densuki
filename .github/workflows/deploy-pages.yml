name: Deploy GitHub Pages

on:
  workflow_dispatch:  # manual trigger
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'assets/**'
      - 'generators/**'
      - 'scripts/**'
  schedule:
    - cron: "0 4 * * *"  # atualiza todo dia às 4h

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Instalar dependências
        run: |
          if [ -f package.json ]; then
            npm install
          fi
      
      - name: Gerar dados dinâmicos
        run: |
          # Executa todos os generators para dados atualizados
          node generators/certificates.js
          node generators/courses.js
          node generators/current-book.js
          node generators/current-game.js
          node generators/custom-stats.js
          node generators/weekly-song.js
          
          # Copia dados atualizados para docs/data/
          cp assets/*.json docs/data/ || true
      
      - name: Build do site (opcional)
        run: |
          # Se você tiver um build script para HTML
          # node docs/js/build.js
          
          # Ou apenas confirma que os arquivos estão ok
          echo "✅ Build concluído"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      
      - name: Deploy para GitHub Pages
        uses: actions/deploy-pages@v4