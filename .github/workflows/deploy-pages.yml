name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
  # branches: [ main ]
    branches: [ deepseek ]
    paths:
      - 'docs/**'
      - 'assets/**'
      - 'generators/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Criar docs/data se não existir
        run: mkdir -p docs/data

      - name: Inicializar JSONs vazios
        run: |
          for file in assets/*.json; do
            if [ ! -s "$file" ]; then
              echo "⚠️ $file está vazio, inicializando..."
              if [[ "$file" == *"statistics.json" ]] || [[ "$file" == *"cache.json" ]]; then
                echo '{}' > "$file"
              else
                echo '[]' > "$file"
              fi
            fi
          done

      - name: Gerar dados dinâmicos
        continue-on-error: true
        run: |
          for generator in certificates courses current-book current-game custom-stats weekly-song; do
            if [ -f "generators/${generator}.js" ]; then
              echo "▶️ Rodando generators/${generator}.js"
              node generators/${generator}.js || echo "⚠️ ${generator}.js falhou"
            fi
          done

      - name: Sincronizar JSONs para docs/data
        run: |
          mkdir -p docs/data
          for file in assets/*.json; do
            if [ -f "$file" ]; then
              cp "$file" "docs/data/$(basename "$file")"
              echo "✅ Copiado: $(basename "$file")"
            fi
          done
          echo "📁 Conteúdo de docs/data/:"
          ls -la docs/data/ || echo "⚠️ docs/data/ está vazio"

      - name: Validar estrutura do docs
        run: |
          echo "📁 Conteúdo de docs/:"
          ls -la docs/
          echo ""
          echo "📄 Arquivos HTML:"
          find docs/ -name "*.html" -type f || echo "⚠️ Nenhum HTML encontrado"

      - name: Validar e criar index.html
        run: |
          if [ -f docs/index.html ]; then
            echo "✅ index.html encontrado"
            echo "Primeiras 5 linhas:"
            head -n 5 docs/index.html
          else
            echo "❌ index.html NÃO encontrado!"
            echo "Criando index.html básico..."
            printf '%s\n' \
              '<!DOCTYPE html>' \
              '<html lang="pt-BR">' \
              '<head>' \
              '  <meta charset="UTF-8">' \
              '  <meta name="viewport" content="width=device-width, initial-scale=1.0">' \
              '  <title>Densuki</title>' \
              '  <style>' \
              '    body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; background: #0a0a0f; color: #f0f0ff; }' \
              '    h1 { color: #8b5cf6; }' \
              '    a { color: #a78bfa; }' \
              '  </style>' \
              '</head>' \
              '<body>' \
              '  <h1>🌙 Densuki</h1>' \
              '  <p>Bem-vindo ao meu portfólio!</p>' \
              '  <p>Site em construção... 🚀</p>' \
              '  <ul>' \
              '    <li><a href="https://github.com/Densuki">GitHub</a></li>' \
              '  </ul>' \
              '</body>' \
              '</html>' > docs/index.html
            echo "✅ index.html criado com sucesso!"
          fi

      - name: Verificar arquivos essenciais
        run: |
          echo "=== VERIFICANDO ARQUIVOS ESSENCIAIS ==="
          [ -f docs/index.html ] && echo "✅ index.html" || echo "❌ index.html FALTANDO"
          [ -d docs/assets ] && echo "✅ assets/" || echo "❌ assets/ FALTANDO"
          [ -d docs/data ] && echo "✅ data/" || echo "❌ data/ FALTANDO"
          [ -d docs/js ] && echo "✅ js/" || echo "❌ js/ FALTANDO"
          [ -f docs/assets/css/style.css ] && echo "✅ style.css" || echo "❌ style.css FALTANDO"
          [ -f docs/js/main.js ] && echo "✅ main.js" || echo "❌ main.js FALTANDO"

      - name: Debug - Verificar estrutura completa
        run: |
          echo "=== ESTRUTURA COMPLETA DE docs/ ==="
          find docs/ -type f | sort || echo "⚠️ docs/ vazio"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4