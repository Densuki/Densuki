name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'assets/**'
      - 'generators/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Criar docs/data se não existir
        run: mkdir -p docs/data

      - name: Gerar dados dinâmicos
        continue-on-error: true  # ✅ Continua mesmo se algum generator falhar
        run: |
          # Executa generators se existirem
          for generator in certificates courses current-book current-game custom-stats weekly-song; do
            if [ -f "generators/${generator}.js" ]; then
              echo "▶️ Rodando generators/${generator}.js"
              node generators/${generator}.js || echo "⚠️ ${generator}.js falhou"
            fi
          done

      - name: Sincronizar JSONs para docs/data
        run: |
          cp assets/*.json docs/data/ 2>/dev/null || echo "⚠️ Nenhum JSON encontrado em assets/"
          ls -la docs/data/ || echo "⚠️ docs/data/ está vazio"

      - name: Verificar se existe index.html
        run: |
          if [ ! -f docs/index.html ]; then
            echo "⚠️ docs/index.html não encontrado!"
            echo 'Criando index.html padrão...'
            cat > docs/index.html << 'EOF'
            <!DOCTYPE html>
            <html lang="pt-BR">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Densuki</title>
            </head>
            <body>
              <h1>🚀 Densuki</h1>
              <p>Bem-vindo ao meu portfólio!</p>
              <ul>
                <li><a href="about.html">Sobre</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
              </ul>
            </body>
            </html>
            EOF
          fi

      - name: Listar conteúdo de docs
        run: |
          echo "📁 Conteúdo de docs/:"
          ls -la docs/
          echo ""
          echo "📄 Arquivos HTML:"
          find docs/ -name "*.html" -type f

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Debug - Verificar estrutura
        run: |
          echo "=== Estrutura de docs/ ==="
          tree docs/ || find docs/ -type f
          echo ""
          echo "=== Conteúdo de docs/data/ ==="
          cat docs/data/*.json 2>/dev/null || echo "Sem JSONs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4