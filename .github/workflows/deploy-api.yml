name: Deploy API

on:
  push:
  # branches: [ main ]
    branches: [ Deepseek ]
    paths:
      - 'backend/api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        cd backend/api
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run API (simplificado - para GitHub Pages)
      run: |
        cd backend/api
        # Iniciar o servidor em background (apenas para teste)
        python app.py &
        sleep 5
        echo "API started successfully"